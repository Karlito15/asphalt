version: '3'

silent: true

vars:
    SYMFONY: symfony
    SYMFONY_CONSOLE: "{{.SYMFONY}} console"

tasks:
    default:
        cmds:
            - task: help

    help:
        desc: Display this help
        cmds:
            - echo "{{.GREETING}}"
            - task --list

    ### ASPHALT

    database:
        desc: "Delete Database, Create Database, Load Migrations"
        cmds:
            - "{{.SYMFONY_CONSOLE}} doctrine:cache:clear-metadata"  # 
            - "{{.SYMFONY_CONSOLE}} doctrine:cache:clear-query"     # 
            - "{{.SYMFONY_CONSOLE}} doctrine:cache:clear-result"    # 
            - Task Sym:dd                                           # Delete Database
            - Task Sym:dc                                           # Create Database
            - Task Sym:dmm                                          # Load Migrations
        ignore_error: true
        platforms: [windows/amd64]
    import:
        desc: "Task Database + Import Datas to Database"
        cmds:
            - Task A9:database                                      # Delete Database
            - "{{.SYMFONY_CONSOLE}} asphalt:csv:migration import"   # Import Datas
        ignore_error: true
        platforms: [windows/amd64]
    export:
        desc: "Export Datas from Database"
        cmds:
            - "{{.SYMFONY_CONSOLE}} asphalt:csv:migration export"   # Export Datas
        ignore_error: true
        platforms: [windows/amd64]
    cron:
        desc: "CRON"
        cmds:
            - "{{.SYMFONY_CONSOLE}} asphalt:cron:count:brand"       # Compte le nombre de voitures par Marque
            - "{{.SYMFONY_CONSOLE}} asphalt:cron:count:class"       # Compte le nombre de voitures par Class
            - "{{.SYMFONY_CONSOLE}} asphalt:cron:checkup:garage"    # Mets à jour la VoitureDESC TO DO
            - "{{.SYMFONY_CONSOLE}} asphalt:yaml:index:garage"      # Créer le listing du Garage
            - "{{.SYMFONY_CONSOLE}} asphalt:yaml:index:mission"     # Créer le listing des Missions
            - "{{.SYMFONY_CONSOLE}} asphalt:yaml:index:race"        # Créer le listing des Courses
            - "{{.SYMFONY_CONSOLE}} asphalt:yaml:page:garage"       # Créer le listing des Pages
            - "{{.SYMFONY_CONSOLE}} asphalt:csv:order:class export" # Export Garage Order By Class
        ignore_error: true
        platforms: [windows/amd64]
    launch:
        desc: "Start Symfony server for local dev"
        cmds:
            - Task Sym:secure
            - Task Sym:start
            - Task Sym:open
        ignore_error: true
        platforms: [windows/amd64]
    restart:
        desc: "Restart Symfony Server for Local Dev"
        cmds:
            - Task Sym:stop
            - Task A9:launch
        ignore_error: true
        platforms: [windows/amd64]
    scripts:
        desc: "Clear Cache, Install Libraries, Update Librairies, Install Assets, Compile Assets"
        cmds:
            - "{{.COMPOSER}} run post-update-cmd"
        ignore_error: true
        platforms: [windows/amd64]
    initialize:
        desc: "Initialize Project"
        cmds:
            - Task A9:database
            - Task A9:import
#            - Task A9:cron
            - Task A9:export
            - Task A9:scripts
            - Task A9:launch
            # - "rm -rf public/cache/"
        ignore_error: false
        platforms: [windows/amd64]
