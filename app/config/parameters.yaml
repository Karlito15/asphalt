parameters:
    metas:
        title:              'Asphalt Legends Unite'
        author:             'Giancarlo PALUMBO'
        email:              'giancarlo.palumbo@free.fr'
        description:        ~
        generator:          ~
    classes:
        table:              'table table-bordered table-striped text-light'
        td:                 'my-0 py-0 align-middle'
        btn:                'btn btn-sm btn-outline-info rounded-3 py-1 m-0'
        input:              'text-center fw-bolder form-control-sm form-control'
#        input:              'text-center fw-bolder form-control-plaintext form-control-sm'
    games:
        pack_blueprint:     6
        pack_price:         900
    images:
        avatar: 'images/sako-01.jpg'
    folders.cache: '%kernel.project_dir%/public/cache/'
    folders.csv: '%kernel.project_dir%/../documents/csv/'
    folders.cron: '%kernel.project_dir%/../documents/csv/cron/'
    folders.database: '%kernel.project_dir%/../documents/csv/database/'
    folders.yaml: '%kernel.project_dir%/../documents/yaml/'
    folders.sheet: '%kernel.project_dir%/../documents/yaml/sheet/'
    csv.header.garage.app:                ['Brand', 'Model', 'Stars', 'GameUpdate', 'CarOrder', 'StatOrder', 'Level', 'Epic', 'SettingClassValue']
    csv.header.garage.blueprint:          ['Star1', 'Star2', 'Star3', 'Star4', 'Star5', 'Star6', 'Brand', 'Model']
    csv.header.garage.evo:                ['Number']
    csv.header.garage.gauntlet:           ['Speed', 'Acceleration', 'Handling', 'Nitro', 'Mark', 'Division', 'Brand', 'Model']
    csv.header.garage.rank:               ['Star0', 'Star1', 'Star2', 'Star3', 'Star4', 'Star5', 'Star6', 'Brand', 'Model']
    csv.header.garage.stats:              ['Speed', 'Acceleration', 'Handling', 'Nitro', 'Average', 'Brand', 'Model']
