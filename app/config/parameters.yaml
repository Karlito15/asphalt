    csv.header.garage.upgrade:            ['Speed', 'Acceleration', 'Handling', 'Nitro', 'Common', 'Rare', 'Epic', 'Brand', 'Model']
    csv.header.garage.setting.blueprint:  ['Brand', 'Model', 'SettingBlueprint']
    csv.header.garage.setting.level:      ['Brand', 'Model', 'SettingLevel']
    csv.header.garage.setting.tag:        ['Brand', 'Model', 'SettingTag']
    csv.header.garage.setting.unit-price: ['Brand', 'Model', 'SettingPrice']
    csv.header.mission.app:               ['Week', 'Region', 'Track', 'Class', 'Brand', 'Description', 'Success', 'Target', 'Task', 'Type']
    csv.header.mission.commons:           ['Value', 'Slug']
    csv.header.inventory:                 ['Category', 'Label', 'Value', 'Filter', 'Position', 'Active']
    csv.header.race.app:                  ['Season', 'RaceOrder', 'Mode', 'Time', 'English']
    csv.header.race.mode:                 ['Name', 'Slug']
    csv.header.race.region:               ['Name', 'Slug']
    csv.header.race.season:               ['Chapter', 'Name', 'Slug']
    csv.header.race.time:                 ['Name']
    csv.header.race.track:                ['English', 'French', 'Slug', 'Region']
    csv.header.setting.blueprint:         ['Star1', 'Star2', 'Star3', 'Star4', 'Star5', 'Star6', 'Total', 'Slug']
    csv.header.setting.brand:             ['Name', 'Number', 'Slug']
    csv.header.setting.class:             ['Label', 'Value', 'Order', 'Number', 'Median', 'Slug']
    csv.header.setting.level:             ['Level', 'Common', 'Rare', 'Epic', 'Slug']
    csv.header.setting.tag:               ['Value', 'Number', 'Slug']
    csv.header.setting.unit-price:        ['Level01', 'Level02', 'Level03', 'Level04', 'Level05', 'Level06', 'Level07', 'Level08', 'Level09', 'Level10', 'Level11', 'Level12', 'Level13', 'Common', 'Rare', 'Epic', 'Slug']
when@dev:
    parameters:
        cache_lifetime:
            dashboards:     60   # 1 min
            garages:        60   # 1 min
            missions:       60   # 1 min
            races:          60   # 1 min
            sitemaps:       300  # 5 mins
            statistics:     300  # 5 mins
        images:
            logo:           'images/logo-green.png'
when@prod:
    parameters:
        cache_lifetime:
            dashboards:     3600    # (60 * 60 = 1 hour)
            garages:        3600    # (60 * 60 = 1 hour)
            missions:       3600    # (60 * 60 = 1 hour)
            races:          2678400 # (60 * 60 * 24 * 31 = 1 month)
            sitemaps:       2678400 # (60 * 60 * 24 * 31 = 1 month)
            statistics:     2678400 # (60 * 60 * 24 * 31 = 1 month)
        images:
            logo:           'images/logo-white.png'
